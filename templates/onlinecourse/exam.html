<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ course.name }} - Exam</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h1 class="mb-0">{{ course.name }} - Mock Exam</h1>
            </div>
            <div class="card-body">
                <p class="lead">Answer all questions below:</p>
                <form action="{% url 'submit' course.id %}" method="post">
                    {% csrf_token %}
                    {% for question in questions %}
                        <div class="card mb-4">
                            <div class="card-header">
                                <strong>Question {{ forloop.counter }}:</strong> {{ question.question_text }}
                            </div>
                            <div class="card-body">
                                {% for choice in question.choices.all %}
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="choice_{{ question.id }}" id="choice_{{ choice.id }}" value="{{ choice.id }}">
                                        <label class="form-check-label" for="choice_{{ choice.id }}">
                                            {{ choice.choice_text }}
                                        </label>
                                    </div>
                                {% endfor %}
                            </div>
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary btn-lg">Submit Exam</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
